<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Legal Portal — Secure Access Matrix</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-dark: #0a0c10;
            --card-bg: rgba(18, 22, 31, 0.75);
            --primary-glow: #38bdf8;
            --accent-glow: #818cf8;
        }

        body {
            background-color: var(--bg-dark);
            color: #f8fafc;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            perspective: 1000px;
        }

        /* Interactive Ambient Particle Backdrop Canvas */
        #bg-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -1;
            pointer-events: none;
        }

        /* Interactive Dynamic Cursor Follower Matrix Elements */
        .cursor-glow {
            position: fixed;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(56, 189, 248, 0.15) 0%, rgba(0,0,0,0) 70%);
            border-radius: 50%;
            pointer-events: none;
            transform: translate(-50%, -50%);
            z-index: -1;
            transition: width 0.3s, height 0.3s;
        }

        /* 3D Motion Controlled Floating Frame Base Container */
        .scene-container {
            width: 100%;
            max-width: 450px;
            padding: 20px;
            transform-style: preserve-3d;
            will-change: transform;
        }

        .auth-card {
            background: var(--card-bg);
            -webkit-backdrop-filter: blur(16px) saturate(120%);
            backdrop-filter: blur(16px) saturate(120%);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5),
                        0 0 40px rgba(56, 189, 248, 0.05);
            transform-style: preserve-3d;
            transition: box-shadow 0.3s;
        }

        .auth-card:hover {
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.6),
                        0 0 50px rgba(129, 140, 246, 0.15);
        }

        /* Elements popping out along the 3D Z-Axis */
        .translate-z-title { transform: translateZ(50px); text-shadow: 0 5px 15px rgba(0,0,0,0.5); }
        .translate-z-form { transform: translateZ(30px); }

        /* Unified Form Transition Deck Styles */
        .form-panel {
            display: none;
            opacity: 0;
            transform: scale(0.95) translateY(10px);
            transition: opacity 0.3s cubic-bezier(0.4, 0, 0.2, 1), 
                        transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .form-panel.active {
            display: block;
        }
        
        .form-panel.show {
            opacity: 1;
            transform: scale(1) translateY(0);
        }

        /* Glass UI Inputs Controls Structure */
        .form-control, .form-select {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #f8fafc;
            border-radius: 12px;
            padding: 12px 16px;
            transition: all 0.3s ease;
        }

        .form-control:focus, .form-select:focus {
            background: rgba(255, 255, 255, 0.06);
            border-color: var(--primary-glow);
            color: #f8fafc;
            box-shadow: 0 0 15px rgba(56, 189, 248, 0.25);
        }

        .input-group-text {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #94a3b8;
            border-radius: 12px;
        }

        /* Dynamic Neon Glow Navigation Action Buttons */
        .btn-glow {
            background: linear-gradient(135deg, var(--primary-glow), var(--accent-glow));
            border: none;
            color: #0f172a;
            font-weight: 600;
            border-radius: 12px;
            padding: 12px;
            transition: all 0.3s ease;
        }

        .btn-glow:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(56, 189, 248, 0.4);
            color: #0f172a;
        }

        .link-toggle {
            color: #94a3b8;
            text-decoration: none;
            font-size: 0.9rem;
            transition: color 0.2s;
            cursor: pointer;
        }

        .link-toggle:hover {
            color: var(--primary-glow);
        }

        /* Form expansion slide engine */
        .hidden-panel {
            display: none;
            opacity: 0;
            transform: translateY(-10px);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .hidden-panel.reveal-group {
            display: block;
            opacity: 1;
            transform: translateY(0);
        }

        /* Ensure all text elements are high-contrast white */
body, h1, h2, h3, p, label, .text-muted {
    color: #ffffff !important;
}

/* Lighten the placeholder text for inputs */
.form-control::placeholder {
    color: rgba(255, 255, 255, 0.4) !important;
}

/* Ensure the 'small' tags and help text are still readable but slightly dimmed */
.text-muted {
    color: rgba(255, 255, 255, 0.7) !important;
}

/* Ensure the link-toggles remain visible */
.link-toggle {
    color: #38bdf8 !important; /* Matches your primary glow for better visibility */
}

/* Fix input group icons/text */
.input-group-text {
    background: rgba(255, 255, 255, 0.1) !important;
    border: 1px solid rgba(255, 255, 255, 0.2) !important;
    color: #ffffff !important;
}

    </style>
</head>
<body>

    <canvas id="bg-canvas"></canvas>
    
    <div class="cursor-glow" id="mouse-glow"></div>

    <div class="scene-container" id="tilt-container">
        <div class="auth-card">
            
            <div id="panel-login" class="form-panel active show">
                <div class="text-center mb-4 translate-z-title">
                    <i class="fa-solid fa-scale-balanced fa-3x text-info mb-3"></i>
                    <h2 class="fw-bold">Welcome Back</h2>
                    <p class="text-muted small">Enter legal profile authorization token credentials</p>
                </div>
                
                <form id="login-form" class="translate-z-form">
                    <div class="mb-3">
                        <label class="form-label small text-muted">Email Identity</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="fa-solid fa-envelope"></i></span>
                            <input type="email" id="login-email" class="form-control" placeholder="name@firm.com" required autocomplete="username">
                        </div>
                    </div>
                    <div class="mb-4">
                        <label class="form-label small text-muted">Password Security Cipher</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="fa-solid fa-lock"></i></span>
                            <input type="password" id="login-password" class="form-control" placeholder="••••••••" required autocomplete="current-password">
                        </div>
                    </div>
                    <button type="submit" class="btn btn-glow w-100 mb-3">System Identity Login</button>
                    
                    <div class="d-flex justify-content-between pt-2 border-top border-secondary-subtle">
                        <span class="link-toggle" onclick="switchPanel('register')"><i class="fa-solid fa-user-plus me-1"></i>Create Account</span>
                        <span class="link-toggle" onclick="switchPanel('forgot')">Forgot Password?<i class="fa-solid fa-arrow-right-long ms-1"></i></span>
                    </div>
                </form>
            </div>

            <div id="panel-register" class="form-panel">
                <div class="text-center mb-4 translate-z-title">
                    <i class="fa-solid fa-user-shield fa-3x text-indigo mb-3"></i>
                    <h2 class="fw-bold">Establish Profile</h2>
                    <p class="text-muted small">Initialize cross-origin cloud secure network configurations</p>
                </div>
                
                <form id="register-form" class="translate-z-form">
                    <div class="mb-3">
                        <label class="form-label small text-muted">Network Identification Email</label>
                        <input type="email" id="register-email" class="form-control" placeholder="name@firm.com" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label small text-muted">Create Vault Password</label>
                        <input type="password" id="register-password" class="form-control" placeholder="••••••••" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label small text-muted">System Operational Role Matrix</label>
                        <select id="register-role" class="form-select" required>
                            <option value="" disabled selected>Select node permission matrix...</option>
                            <option value="reader">Public Board Reader</option>
                            <option value="customer">Client Litigant</option>
                            <option value="lawyer">Advocate / Court Practitioner</option>
                        </select>
                    </div>
                    
                    <div class="mb-4 hidden-panel" id="customer-type-group">
                        <label class="form-label small text-muted">Corporate Entity Subtype</label>
                        <select id="customer-type" class="form-select">
                            <option value="individual">Individual Private Client</option>
                            <option value="corporate">Corporate Entity / Firm</option>
                        </select>
                    </div>

                    <button type="submit" class="btn btn-glow w-100 mb-3">Verify Profile Generation</button>
                    <div class="text-center">
                        <span class="link-toggle" onclick="switchPanel('login')"><i class="fa-solid fa-arrow-left-long me-1"></i>Return to Portal Entry</span>
                    </div>
                </form>
            </div>

            <div id="panel-forgot" class="form-panel">
                <div class="text-center mb-4 translate-z-title">
                    <i class="fa-solid fa-key fa-3x text-warning mb-3"></i>
                    <h2 class="fw-bold">Vault Recovery</h2>
                    <p class="text-muted small">Request token cryptographic recovery links</p>
                </div>
                
                <form id="forgot-form" class="translate-z-form">
                    <div class="mb-4">
                        <label class="form-label small text-muted">Registered Email Address Context</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="fa-solid fa-envelope-open-text"></i></span>
                            <input type="email" id="forgot-email" class="form-control" placeholder="recovery@firm.com" required>
                        </div>
                    </div>
                    
                    <button type="submit" class="btn btn-glow w-100 mb-3">Dispatch Recovery Signal</button>
                    <div class="text-center">
                        <span class="link-toggle" onclick="switchPanel('login')"><i class="fa-solid fa-arrow-left-long me-1"></i>Return to Portal Entry</span>
                    </div>
                </form>
            </div>

        </div>
    </div>

    <script src="js/auth.js"></script>
    <script>
        // ─── 1. SMOOTH PANEL INTERCHANGE ROUTING ENGINE ───
        function switchPanel(targetPanel) {
            const activePanel = document.querySelector('.form-panel.active');
            const newPanel = document.getElementById(`panel-${targetPanel}`);
            
            if (activePanel && activePanel !== newPanel) {
                // Step 1: Smoothly fade out active panel opacity
                activePanel.classList.remove('show');
                
                setTimeout(() => {
                    // Step 2: Unmount display layer once animation clears
                    activePanel.classList.remove('active');
                    
                    // Step 3: Mount and fade in the target panel
                    newPanel.classList.add('active');
                    newPanel.offsetHeight; // Force layouts flush execution sequences
                    newPanel.classList.add('show');
                }, 300);
            }
        }

        // ─── 2. DYNAMIC INPUT SUBPANEL SELECT DEPENDENCY TOGGLE ───
        document.getElementById('register-role').addEventListener('change', function() {
            const targetGroup = document.getElementById('customer-type-group');
            const subInput = document.getElementById('customer-type');
            
            if (this.value === 'customer') {
                targetGroup.classList.add('reveal-group');
                subInput.setAttribute('required', 'true');
            } else {
                targetGroup.classList.remove('reveal-group');
                subInput.removeAttribute('required');
            }
        });

        // ─── 3. 3D GYROSCOPIC MOUSE PARALLAX TILT LOGIC ───
        const tiltContainer = document.getElementById('tilt-container');
        const mouseGlow = document.getElementById('mouse-glow');
        
        document.addEventListener('mousemove', (e) => {
            const { clientX: x, clientY: y } = e;
            
            mouseGlow.style.left = `${x}px`;
            mouseGlow.style.top = `${y}px`;

            const halfWidth = window.innerWidth / 2;
            const halfHeight = window.innerHeight / 2;
            
            const rotateX = -((y - halfHeight) / halfHeight) * 12;
            const rotateY = ((x - halfWidth) / halfWidth) * 12;

            tiltContainer.style.transform = `rotateX(${rotateX}deg) rotateY(${rotateY}deg)`;
        });

        document.addEventListener('mouseleave', () => {
            tiltContainer.style.transform = 'rotateX(0deg) rotateY(0deg)';
        });

        // ─── 4. BACKGROUND CANVAS AMBIENT MATRIX PARTICLES GENERATOR ───
        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');
        
        let particles = [];
        
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 1.5 + 0.5;
                this.speedX = Math.random() * 0.4 - 0.2;
                this.speedY = Math.random() * 0.4 - 0.2;
                this.alpha = Math.random() * 0.5 + 0.1;
            }
            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                if (this.x < 0 || this.x > canvas.width) this.speedX *= -1;
                if (this.y < 0 || this.y > canvas.height) this.speedY *= -1;
            }
            draw() {
                ctx.save();
                ctx.globalAlpha = this.alpha;
                ctx.fillStyle = '#38bdf8';
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }
        }

        for (let i = 0; i < 65; i++) {
            particles.push(new Particle());
        }

        function animateBackdrop() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => {
                p.update();
                p.draw();
            });
            requestAnimationFrame(animateBackdrop);
        }
        animateBackdrop();
    </script>
</body>
</html>
